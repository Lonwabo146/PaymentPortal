name: PaymentPortal CI/CD Pipeline

# Triggers when code is pushed to main or any branch
on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ─── Job 1: Build and Test the API ───────────────────────────
  build-api:
    name: Build & Test API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore PaymentPortal.API/PaymentPortal.API.csproj

      - name: Build API
        run: dotnet build PaymentPortal.API/PaymentPortal.API.csproj --no-restore --configuration Release

      - name: Run Tests
        run: dotnet test PaymentPortal.API/PaymentPortal.API.csproj --no-build --configuration Release
        continue-on-error: true  # won't fail pipeline if no tests exist yet

  # ─── Job 2: Build the React App ──────────────────────────────
  build-react:
    name: Build React Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: payment-portal-client/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: payment-portal-client

      - name: Build React app
        run: npm run build
        working-directory: payment-portal-client

  # ─── Job 3: Security Scan ────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build-api, build-react]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: payment-portal-client

      - name: Run npm audit (dependency vulnerability scan)
        run: npm audit --audit-level=high
        working-directory: payment-portal-client
        continue-on-error: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Check for vulnerable NuGet packages
        run: dotnet list PaymentPortal.API/PaymentPortal.API.csproj package --vulnerable
        continue-on-error: true