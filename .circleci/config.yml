version: 2.1

orbs:
  node: circleci/node@5.1.0
  dotnet: circleci/dotnet@1.0.1

jobs:

  # ── Job 1: Build and test the API ──────────────────────────
  build-api:
    docker:
      - image: mcr.microsoft.com/dotnet/sdk:9.0
    steps:
      - checkout

      - run:
          name: Create appsettings.json for build
          command: |
            echo '{
              "ConnectionStrings": {
                "DefaultConnection": "Server=localhost;Database=PaymentPortalDB;Trusted_Connection=True;"
              },
              "Jwt": {
                "Key": "pipeline-dummy-key-32-characters-long!!",
                "Issuer": "PaymentPortalAPI",
                "Audience": "PaymentPortalClient"
              },
              "Logging": {
                "LogLevel": {
                  "Default": "Information"
                }
              },
              "AllowedHosts": "*"
            }' > PaymentPortal.API/appsettings.json

      - run:
          name: Restore dependencies
          command: dotnet restore PaymentPortal.API/PaymentPortal.API.csproj

      - run:
          name: Build API
          command: dotnet build PaymentPortal.API/PaymentPortal.API.csproj --no-restore --configuration Release

  # ── Job 2: Build React frontend ────────────────────────────
  build-react:
    docker:
      - image: cimg/node:20.0
    steps:
      - checkout

      - run:
          name: Install dependencies
          command: npm install
          working_directory: payment-portal-client

      - run:
          name: Build React app
          command: npm run build
          working_directory: payment-portal-client

  # ── Job 3: SonarCloud analysis ─────────────────────────────
  sonarcloud-scan:
    docker:
      - image: cimg/node:20.0
    steps:
      - checkout

      - run:
          name: Install SonarScanner
          command: npm install -g sonarqube-scanner

      - run:
          name: Install React dependencies
          command: npm install
          working_directory: payment-portal-client

      - run:
          name: Run SonarCloud Analysis
          command: |
            sonar-scanner \
              -Dsonar.organization=$SONAR_ORG \
              -Dsonar.projectKey=$SONAR_PROJECT_KEY \
              -Dsonar.sources=. \
              -Dsonar.exclusions=**/node_modules/**,**/bin/**,**/obj/**,**/*.test.*,**/dist/** \
              -Dsonar.host.url=https://sonarcloud.io \
              -Dsonar.token=$SONAR_TOKEN \
              -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

# ── Workflow: run all jobs on every push ───────────────────
workflows:
  payment-portal-pipeline:
    jobs:
      - build-api
      - build-react
      - sonarcloud-scan:
          requires:
            - build-api
            - build-react


 
