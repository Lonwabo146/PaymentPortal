version: 2.1

jobs:

  build-api:
    docker:
      - image: mcr.microsoft.com/dotnet/sdk:10.0
    steps:
      - checkout

      - run:
          name: Create appsettings.json for build
          command: |
            cat > PaymentPortal.API/appsettings.json << 'EOF'
            {
              "ConnectionStrings": {
                "DefaultConnection": "Server=localhost;Database=PaymentPortalDB;Trusted_Connection=True;"
              },
              "Jwt": {
                "Key": "pipeline-dummy-key-32-characters-long!!",
                "Issuer": "PaymentPortalAPI",
                "Audience": "PaymentPortalClient"
              },
              "Logging": {
                "LogLevel": {
                  "Default": "Information"
                }
              },
              "AllowedHosts": "*"
            }
            EOF

      - run:
          name: Restore dependencies
          command: dotnet restore PaymentPortal.API/PaymentPortal.API.csproj

      - run:
          name: Build API
          command: dotnet build PaymentPortal.API/PaymentPortal.API.csproj --no-restore --configuration Release

  build-react:
    docker:
      - image: cimg/node:20.11
    steps:
      - checkout

      - run:
          name: Install dependencies
          command: |
            cd payment-portal-client
            npm install

      - run:
          name: Build React app
          command: |
            cd payment-portal-client
            npm run build

  sonarcloud-scan:
    docker:
      - image: cimg/node:20.11
    steps:
      - checkout

      - run:
          name: Install SonarScanner
          command: npm install -g sonarqube-scanner

      - run:
          name: Install React dependencies
          command: |
            cd payment-portal-client
            npm install

      - run:
          name: Run SonarCloud Analysis
          command: |
            sonar-scanner \
              -Dsonar.organization=$SONAR_ORG \
              -Dsonar.projectKey=$SONAR_PROJECT_KEY \
              -Dsonar.sources=. \
              -Dsonar.exclusions=**/node_modules/**,**/bin/**,**/obj/**,**/*.test.*,**/dist/** \
              -Dsonar.host.url=https://sonarcloud.io \
              -Dsonar.token=$SONAR_TOKEN

workflows:
  payment-portal-pipeline:
    jobs:
      - build-api
      - build-react
      - sonarcloud-scan:
          requires:
            - build-api
            - build-react
